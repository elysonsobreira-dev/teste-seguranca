<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Teste de Segurança - Simulação</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(120deg, #0f2027, #2c5364);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
    }
    input {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #2c5364;
      color: white;
      border: none;
      cursor: pointer;
    }
    .alert {
      margin-top: 10px;
      color: red;
      font-weight: bold;
    }
    .warning {
      font-size: 12px;
      color: orange;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<div class="box">
  <h3>Simulação de Segurança</h3>

  <div class="warning">
    Faca sua simulação aqui
  </div>

  <input type="text" placeholder="Nome">
  <input type="text" placeholder="Número do cartão">
  <input type="text" placeholder="Validade (MM/AA)">
  <input type="text" placeholder="CVV">

  <button onclick="simular()">Verificar</button>

  <div class="alert" id="msg"></div>
</div>

<script>
function simular() {
  document.getElementById("msg").innerText =
    "⚠️ Este foi um teste! Nunca insira seus dados em sites desconhecidos.";
}
</script>

</body>
</html>
